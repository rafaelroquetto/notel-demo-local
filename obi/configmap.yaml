apiVersion: v1
kind: ConfigMap
metadata:
  name: obi-config
  namespace: obi
data:
  obi-config.yml: |
    log_level: DEBUG

    attributes:
      kubernetes:
        enable: true
        cluster_name: notel-demo-local

    # DEBUG SCOPE: narrowed to the recommendations path (frontend -> recommendation
    # -> product-catalog) so a single curl's bpf_debug output is readable instead
    # of drowning in the otel-lgtm stack. Revert to `- k8s_namespace: "."` (and
    # bpf_debug: false below) for normal operation.
    discovery:
      services:
        - k8s_namespace: opentelemetry-demo
          k8s_deployment_name: "^(frontend|recommendation|product-catalog)$"
      exclude_services:
        - exe_path: ".*alloy.*|.*otelcol.*|.*beyla.*|.*obi.*"

    ebpf:
      # "all" makes OBI inject/read traceparent -> the SDK collision under test.
      context_propagation: "all"
      bpf_debug: true

    otel_traces_export:
      endpoint: http://otel-lgtm.observability.svc.cluster.local:4317
    otel_metrics_export:
      endpoint: http://otel-lgtm.observability.svc.cluster.local:4317
      features:
        - application
        - application_service_graph
        - application_span_otel
        - application_host
        - application_process

    # Prod-faithful network observability (deferred for first bring-up): uncomment
    # and add "network" to features above. Needs hostNetwork (already set).
    # network:
    #   enable: true
    # filter:
    #   network:
    #     k8s_src_owner_name:
    #       not_match: '{kube*,*jaeger*,*prometheus*,*grafana*,*opensearch*,*otel-collector*}'
    #     k8s_dst_owner_name:
    #       not_match: '{kube*,*jaeger*,*prometheus*,*grafana*,*opensearch*,*otel-collector*}'
