# In-cluster OBI agent (prod runs the eBPF agent as a privileged DaemonSet).
# hostPID lets OBI see all node processes; hostNetwork + ClusterFirstWithHostNet
# match prod and are required for network observability. Caps are the prod
# alloy-beyla set; if eBPF programs fail to load, swap them for `privileged: true`.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: obi
  namespace: obi
  labels:
    app: obi
spec:
  selector:
    matchLabels:
      app: obi
  template:
    metadata:
      labels:
        app: obi
    spec:
      serviceAccountName: obi
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists   # run on the tainted control-plane node too
      containers:
        - name: obi
          image: obi:dev     # built locally + kind-loaded
          imagePullPolicy: Never
          env:
            - name: OTEL_EBPF_CONFIG_PATH
              value: /config/obi-config.yml
          securityContext:
            runAsUser: 0
            readOnlyRootFilesystem: true
            capabilities:
              add:
                - BPF
                - SYS_PTRACE
                - NET_RAW
                - NET_ADMIN
                - CHECKPOINT_RESTORE
                - DAC_READ_SEARCH
                - PERFMON
                - SYS_ADMIN
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /config
            - name: tmp
              mountPath: /tmp
            - name: cgroup
              mountPath: /sys/fs/cgroup
            - name: kernel-debug
              mountPath: /sys/kernel/debug
            - name: bpf
              mountPath: /sys/fs/bpf
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              memory: "768Mi"
      volumes:
        - name: config
          configMap:
            name: obi-config
        - name: tmp
          emptyDir: {}
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
        - name: kernel-debug
          hostPath:
            path: /sys/kernel/debug
        - name: bpf
          hostPath:
            path: /sys/fs/bpf
