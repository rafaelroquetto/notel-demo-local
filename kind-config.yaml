# extraMounts expose the host's debugfs + bpffs into the node so OBI's hostPath
# mounts resolve to a populated tracefs/bpffs (eBPF prerequisites).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: notel-demo-local
nodes:
  - role: control-plane
    extraMounts:
      - hostPath: /sys/kernel/debug
        containerPath: /sys/kernel/debug
      - hostPath: /sys/fs/bpf
        containerPath: /sys/fs/bpf
    extraPortMappings:
      - containerPort: 30300   # must equal otel-lgtm's Grafana Service nodePort
        hostPort: 3000
        listenAddress: "127.0.0.1"
        protocol: TCP
