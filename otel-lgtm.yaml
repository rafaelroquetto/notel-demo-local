# Local all-in-one observability backend: grafana/otel-lgtm bundles Grafana,
# Tempo, Prometheus/Mimir, Loki and an embedded OpenTelemetry Collector.
#
# It receives OTLP from BOTH the demo collector (the apps' SDK pipeline) and the
# OBI DaemonSet (the eBPF pipeline) over cluster DNS, so the two can be compared
# side by side in one Grafana. Grafana is published to the host via NodePort
# 30300 (mapped to localhost:3000 by kind-config.yaml). Storage is ephemeral --
# everything is lost when the pod restarts, which is fine for local debugging.
apiVersion: v1
kind: Namespace
metadata:
  name: observability
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-lgtm
  namespace: observability
  labels:
    app: otel-lgtm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-lgtm
  template:
    metadata:
      labels:
        app: otel-lgtm
    spec:
      containers:
        - name: otel-lgtm
          image: grafana/otel-lgtm:latest   # pin a tag for reproducibility if desired
          imagePullPolicy: IfNotPresent
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: grafana
              containerPort: 3000
          env:
            # No login friction for local use.
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Admin"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: otel-lgtm
  namespace: observability
  labels:
    app: otel-lgtm
spec:
  type: NodePort
  selector:
    app: otel-lgtm
  ports:
    # OTLP ports are consumed in-cluster (collector + OBI) via the ClusterIP;
    # their nodePorts are auto-assigned and unused from the host.
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    # Grafana is the only port published to the host (see kind-config.yaml).
    - name: grafana
      port: 3000
      targetPort: 3000
      nodePort: 30300
