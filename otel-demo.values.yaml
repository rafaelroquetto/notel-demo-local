# Overrides for the upstream opentelemetry-demo chart: keep every app service
# with its OTel SDK instrumentation ON (so OBI's eBPF spans collide with the SDK
# spans), strip the bundled backends, and repoint the demo collector at otel-lgtm.

jaeger:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false
opensearch:
  enabled: false

# flagd-ui is an optional flag-editor sidecar that OOMKills at its 250Mi limit
# and crash-loops the pod; not needed for the demo or OBI.
#
# ad + fraud-detection are JVM services (+ the OTel Java agent); the upstream
# 300Mi limit OOMKills them during the all-at-once startup on a single node.
components:
  flagd:
    sidecarContainers: []
  ad:
    resources:
      limits:
        memory: 600Mi
  fraud-detection:
    resources:
      limits:
        memory: 600Mi

# Add the otlp/lgtm exporter and swap each pipeline onto it. The original
# jaeger/prometheus/opensearch exporters stay defined-but-unreferenced (never
# built, so no errors); spanmetrics stays in traces so the metrics pipeline's
# spanmetrics receiver keeps being fed.
opentelemetry-collector:
  config:
    exporters:
      otlp/lgtm:
        endpoint: otel-lgtm.observability.svc.cluster.local:4317
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          exporters: [otlp/lgtm, debug, spanmetrics]
        metrics:
          exporters: [otlp/lgtm, debug]
        logs:
          exporters: [otlp/lgtm, debug]
